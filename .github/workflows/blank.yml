name: Build OpenWrt 25.12.5

on:
  workflow_dispatch:

  schedule:
    - cron: '0 18 * * 5'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout Workflow Repository
      uses: actions/checkout@v4

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          ack antlr3 asciidoc autoconf automake autopoint \
          binutils bison build-essential bzip2 ccache clang cmake \
          cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
          gcc-multilib g++-multilib git gperf haveged help2man intltool \
          libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
          python3-ply python3-docutils qemu-utils rsync scons squashfs-tools \
          subversion swig texinfo uglifyjs unzip vim wget xmlto xsltproc \
          xxd zlib1g-dev

    - name: Clone OpenWrt 25.12.5
      run: |
        git clone --depth=1 --branch v25.12.5 \
          https://github.com/openwrt/openwrt.git openwrt

    - name: Checkout Config Repository
      uses: actions/checkout@v4
      with:
        repository: mzwrt/config
        token: ${{ secrets.CONFIG_PAT }}
        path: config

    - name: Run DIY1
      working-directory: openwrt
      run: |
        chmod +x ../config/openwrt-25-12/diy1.sh
        bash ../config/openwrt-25-12/diy1.sh

    - name: Update Feeds
      working-directory: openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Copy .config
      working-directory: openwrt
      run: |
        cp ../config/openwrt-25-12/.config .config
        make defconfig

    - name: Apply Patch
      working-directory: openwrt
      run: |
        mkdir -p package/firmware/wireless-regdb/patches

        cp ../config/openwrt-25-12/600-custom-change-txpower-and-dfs.patch \
          package/firmware/wireless-regdb/patches/

    - name: Run DIY2
      working-directory: openwrt
      run: |
        chmod +x ../config/openwrt-25-12/diy2.sh
        bash ../config/openwrt-25-12/diy2.sh

    - name: Download Packages
      working-directory: openwrt
      run: |
        make download -j"$(nproc)"
        find dl -size -1024c -delete

    - name: Compile Firmware
      working-directory: openwrt
      run: |
        make -j"$(nproc)" || make -j1 V=s

    - name: Generate Release Info
      if: success()
      run: |
        echo "TAG=v25.12.5-$(date -u +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

        cat > "$GITHUB_WORKSPACE/release.md" << 'EOF'
        ## MzWrt OpenWrt v25.12.5

        ### 更新内容
        - 2016-07-12 统一使用openssl 修正一些不合理的参数

        ### 默认信息
        - IP：192.168.10.1
        - 用户名：root
        - 密码：无
        EOF
        

    - name: Prepare Firmware
      working-directory: openwrt
      run: |
        echo "======================="
        ls -lah bin/targets/mediatek/filogic/
        echo "======================="

        if [ -d bin/targets/mediatek/filogic/packages ]; then
          tar -czf \
            bin/targets/mediatek/filogic/packages.tar.gz \
            -C bin/targets/mediatek/filogic \
            packages
        fi

        find bin/targets/mediatek/filogic \
          -type f \
          -name "openwrt*" \
          -exec bash -c '
            for f; do
              mv "$f" "${f//openwrt/MzWrt}"
            done
          ' bash {} +

    - name: Organize Files
      working-directory: openwrt
      run: |
        mkdir -p upload

        find bin/targets \
          -type f \
          \( \
          -name "*.bin" -o \
          -name "*.itb" -o \
          -name "*.img.gz" -o \
          -name "*.tar.gz" -o \
          -name "*.tar" -o \
          -name "*.manifest" \
          \) \
          -exec cp {} upload/ \;
          cp bin/targets/mediatek/filogic/packages.tar.gz upload/ 2>/dev/null || true
          
    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        name: MzWrt OpenWrt v25.12.5
        body_path: ${{ github.workspace }}/release.md
        generate_release_notes: true
        make_latest: true
        draft: false
        prerelease: false
        files: |
          openwrt/upload/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
