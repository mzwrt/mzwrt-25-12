name: Build OpenWrt 25.12

on:
  workflow_dispatch:

  schedule:
    - cron: '0 18 * * 5'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

    - name: Checkout source
      uses: actions/checkout@v4

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt update

        sudo apt install -y \
        ack antlr3 asciidoc autoconf automake autopoint \
        binutils bison build-essential bzip2 ccache clang cmake \
        cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
        gcc-multilib g++-multilib git gperf haveged help2man intltool \
        libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
        libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
        libncurses5-dev libncursesw5-dev libpython3-dev \
        libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp \
        ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
        python3-ply python3-docutils qemu-utils rsync scons squashfs-tools \
        subversion swig texinfo uglifyjs unzip vim wget xmlto xsltproc \
        xxd zlib1g-dev

    - name: Clone Config Repository
      run: |
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/mzwrt/config.git config

    - name: Copy .config
      run: |
        cp config/openwrt-25-12/.config .config

    - name: Run DIY1
      run: |
        chmod +x config/openwrt-25-12/diy1.sh
        bash config/openwrt-25-12/diy1.sh

    - name: Update Feeds
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Patch
      run: |
        mkdir -p package/firmware/wireless-regdb/patches
        cp config/openwrt-25-12/600-custom-change-txpower-and-dfs.patch \
        package/firmware/wireless-regdb/patches/

    - name: Run DIY2
      run: |
        chmod +x config/openwrt-25-12/diy2.sh
        bash config/openwrt-25-12/diy2.sh

    - name: Download Packages
      run: |
        make defconfig
        make download -j$(nproc)

    - name: Compile Firmware
      run: |
        make -j$(nproc) || make -j1 V=s

    - name: Prepare Firmware
      run: |
        echo "======================="
        ls ./bin/targets/mediatek/filogic/
        echo "======================="
        # 检查并压缩 packages 目录
        if [ -d ./bin/targets/mediatek/filogic/packages ]; then
          tar -czf ./bin/targets/mediatek/filogic/packages.tar.gz -C ./bin/targets/mediatek/filogic packages
        fi

        # 重命名文件：将所有以 "openwrt" 开头的文件名中的 "openwrt" 替换为 "MzWrt"
        find ./bin/targets/mediatek/filogic -type f -name "openwrt*" -exec bash -c '
          for file; do
            mv "$file" "${file//openwrt/MzWrt}"
          done
        ' bash {} +

    - name: Organize Files
      if: success()
      run: |
        mkdir upload
        find bin/targets/ -type f \
        \( -name "*.bin" -o -name "*.itb" -o -name "*.img.gz" -o -name "*.tar.gz" -o -name "*.tar" -o -name "*.manifest" \) \
        -exec cp {} upload/ \;

    - name: Upload Firmware
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-Firmware
        path: upload/

    - name: Upload Bin Directory
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-bin
        path: bin/

    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: |
          logs
          bin
          .config
